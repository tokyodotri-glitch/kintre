<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="鍛錬">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23ff5722'/><text x='50%25' y='54%25' font-family='sans-serif' font-size='100' font-weight='900' fill='%23ffffff' text-anchor='middle' dominant-baseline='middle'>鍛</text></svg>">
<title>鍛錬 / Training Log</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f6f8;
    --surface-2: #eceef2;
    --border: #e0e3e9;
    --border-strong: #c8ccd4;
    --accent: #ff5722;          /* vivid orange */
    --accent-hover: #e64a19;
    --accent-soft: #fff3ef;
    --secondary: #0066ff;       /* electric blue */
    --secondary-soft: #e8f0ff;
    --text: #0a0e1a;
    --text-2: #3b4252;
    --muted: #6b7280;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(255, 87, 34, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(0, 102, 255, 0.03) 0%, transparent 40%);
    background-attachment: fixed;
    color: var(--text); min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "ヒラギノ角ゴ ProN", "Yu Gothic", sans-serif;
    overscroll-behavior-y: none;
  }
  body { padding-top: env(safe-area-inset-top); padding-bottom: 96px; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, button { font-family: inherit; -webkit-appearance: none; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .no-scroll::-webkit-scrollbar { display: none; }
  .no-scroll { scrollbar-width: none; -ms-overflow-style: none; }

  .display { letter-spacing: 0.02em; font-weight: 700; }
  .num { font-family: "Helvetica Neue", Impact, sans-serif; font-weight: 900; }
  .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }

  header.app-header { padding: 28px 20px 20px; max-width: 560px; margin: 0 auto; display: flex; align-items: baseline; justify-content: space-between; }
  .brand-eyebrow { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 0.2em; }
  .brand-title { font-size: 32px; font-weight: 900; margin-top: 2px; line-height: 1; }
  .streak-num { font-size: 36px; color: var(--accent); line-height: 1; }
  .streak-label { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; margin-top: 4px; font-weight: 700; }

  main { padding: 0 20px; max-width: 560px; margin: 0 auto; }

  .label { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; font-weight: 700; margin: 16px 0 8px; }
  .input { width: 100%; padding: 12px 14px; background: #ffffff; border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-size: 15px; outline: none; transition: border-color 150ms; }
  textarea.input { resize: none; line-height: 1.5; }
  .input:focus { border-color: var(--accent); }

  .empty { background: var(--surface); border: 1px dashed var(--border-strong); padding: 32px 20px; margin-top: 16px; border-radius: 14px; text-align: center; color: var(--muted); }
  .empty-icon { font-size: 36px; color: var(--border); margin-bottom: 8px; }

  .ex-card { background: #ffffff; border: 1px solid var(--border); padding: 16px; margin-top: 16px; border-radius: 14px; box-shadow: 0 1px 3px rgba(10, 14, 26, 0.04); }
  .ex-head { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .ex-num { font-size: 18px; color: var(--accent); min-width: 28px; }
  .ex-name-wrap { flex: 1; min-width: 0; }
  .ex-name { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 15px; font-weight: 500; outline: none; }
  .cat-tag { display: inline-block; margin-top: 6px; padding: 2px 8px; font-size: 9px; letter-spacing: 0.15em; font-weight: 700; border-radius: 4px; }

  .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 8px; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .sets-grid { display: grid; grid-template-columns: 32px 1fr 1fr 32px; gap: 8px; align-items: center; }
  .set-head { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; font-weight: 700; }
  .set-num { font-size: 16px; color: var(--text); }
  .cell { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 17px; outline: none; text-align: center; font-weight: 700; }
  .cell:focus { border-color: var(--accent); }

  .add-set-btn { margin-top: 12px; width: 100%; padding: 10px; background: transparent; color: var(--accent); border: 1px dashed var(--border); border-radius: 10px; font-size: 12px; letter-spacing: 0.15em; font-weight: 700; }
  .add-ex-btn { width: 100%; padding: 14px; margin-top: 12px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 12px; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; }
  .save-btn { width: 100%; padding: 16px; margin-top: 20px; background: var(--accent); color: #ffffff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; letter-spacing: 0.2em; box-shadow: 0 4px 12px rgba(255, 87, 34, 0.25); }
  .save-btn:active { background: var(--accent-hover); transform: translateY(1px); }

  .stats-grid { display: grid; gap: 10px; margin-bottom: 20px; }
  .stats-2 { grid-template-columns: 1fr 1fr; }
  .stats-3 { grid-template-columns: 1fr 1fr 1fr; }
  .stat-card { background: #ffffff; border: 1px solid var(--border); border-radius: 12px; padding: 14px; box-shadow: 0 1px 3px rgba(10, 14, 26, 0.04); }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 0.2em; font-weight: 700; }
  .stat-value { font-size: 26px; color: var(--text); line-height: 1.1; margin-top: 6px; }
  .stat-suffix { font-size: 12px; color: var(--muted); margin-left: 4px; font-weight: 500; }

  .session-card { background: #ffffff; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(10, 14, 26, 0.04); }
  .session-head { width: 100%; padding: 16px; background: transparent; border: none; color: var(--text); text-align: left; display: flex; align-items: center; gap: 14px; }
  .session-date { min-width: 52px; }
  .session-date-d { font-size: 24px; color: var(--accent); line-height: 1; }
  .session-date-meta { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; margin-top: 3px; font-weight: 700; }
  .session-titles { flex: 1; min-width: 0; }
  .session-title { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .chevron { color: var(--muted); font-size: 18px; transition: transform 200ms; }
  .session-card.open .chevron { transform: rotate(90deg); }
  .session-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }

  .ex-detail { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .ex-detail:last-of-type { border-bottom: none; }
  .ex-detail-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cat-bar { width: 3px; height: 16px; border-radius: 2px; }
  .ex-detail-name { font-size: 14px; font-weight: 700; }
  .set-line { font-size: 13px; color: var(--muted); display: flex; gap: 16px; }
  .set-line-num { color: var(--accent); min-width: 28px; }
  .set-line-val { color: var(--text); }

  .note-block { padding: 12px 0; border-top: 1px solid var(--border); }
  .note-label { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; font-weight: 700; margin-bottom: 6px; }
  .note-text { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.5; }

  .delete-btn { margin-top: 10px; padding: 8px 14px; background: transparent; border: 1px solid var(--danger); color: var(--danger); border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; font-weight: 700; }

  .chip-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .chip { white-space: nowrap; padding: 8px 14px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 999px; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .chip.active { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 700; }

  .seg-row { display: flex; gap: 6px; background: var(--surface); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
  .seg { flex: 1; padding: 8px 4px; background: transparent; color: var(--muted); border: none; border-radius: 7px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; }
  .seg.active { background: #ffffff; color: var(--accent); box-shadow: 0 1px 3px rgba(10, 14, 26, 0.08); font-weight: 700; }

  .chart-wrap { background: #ffffff; border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-top: 16px; height: 280px; box-shadow: 0 1px 3px rgba(10, 14, 26, 0.04); }
  .chart-empty { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; text-align: center; padding: 16px; line-height: 1.6; }
  .chart-svg { width: 100%; height: 100%; display: block; }
  .metric-desc { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.6; }

  .sync-eyebrow { font-size: 11px; color: var(--muted); letter-spacing: 0.2em; font-weight: 700; margin: 8px 0 16px; }
  .sync-card { background: #ffffff; border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(10, 14, 26, 0.04); }
  .sync-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .sync-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--accent); font-weight: 900; }
  .sync-title { font-size: 18px; font-weight: 700; }
  .sync-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
  .sync-btn { width: 100%; padding: 12px; background: var(--accent); color: #ffffff; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; box-shadow: 0 2px 8px rgba(255, 87, 34, 0.2); }
  .sync-btn:active { background: var(--accent-hover); }
  .sync-btn-import { display: block; padding: 12px; background: var(--accent-soft); color: var(--accent); border: 1px dashed var(--accent); border-radius: 10px; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-align: center; cursor: pointer; }
  .sync-btn-import input { display: none; }

  nav.tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.92); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); border-top: 1px solid var(--border); padding: 10px 8px calc(10px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; z-index: 40; }
  .tab { background: transparent; border: none; color: var(--muted); padding: 6px 10px; text-align: center; flex: 1; }
  .tab.active { color: var(--accent); }
  .tab-code { font-size: 10px; letter-spacing: 0.2em; font-weight: 700; }
  .tab-label { font-size: 12px; font-weight: 500; margin-top: 2px; }

  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--text); color: #ffffff; padding: 12px 20px; border-radius: 999px; font-size: 14px; font-weight: 500; z-index: 50; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); max-width: 90%; text-align: center; animation: slideUp 220ms ease-out both; }

  .sheet-backdrop { position: fixed; inset: 0; background: rgba(10, 14, 26, 0.45); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .sheet { background: var(--bg); width: 100%; max-width: 560px; max-height: 85vh; border-radius: 20px 20px 0 0; border: 1px solid var(--border); border-bottom: none; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); animation: slideUp 220ms ease-out both; box-shadow: 0 -8px 32px rgba(10, 14, 26, 0.12); }
  .sheet-handle { display: flex; justify-content: center; padding: 10px 0 4px; }
  .sheet-handle-bar { width: 40px; height: 4px; background: var(--border-strong); border-radius: 2px; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px 16px; border-bottom: 1px solid var(--border); }
  .sheet-title { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
  .sheet-close { background: transparent; border: none; color: var(--muted); font-size: 24px; padding: 0; line-height: 1; }
  .sheet-cats { display: flex; gap: 8px; overflow-x: auto; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .sheet-body { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }

  .ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ex-pick { padding: 16px 12px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 12px; font-size: 13px; font-weight: 500; text-align: left; line-height: 1.4; display: flex; align-items: stretch; gap: 10px; min-height: 56px; }
  .ex-pick-bar { width: 4px; border-radius: 2px; flex-shrink: 0; }
  .ex-pick-name { flex: 1; align-self: center; }
  .bw-tag {
    display: inline-block; margin-left: 6px; padding: 1px 5px;
    background: #ec489922; color: #ec4899;
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    border-radius: 3px; vertical-align: middle;
  }
  .bw-tag.time-tag { background: #60a5fa22; color: #60a5fa; }
  .bw-tag.cable-tag { background: #06b6d422; color: #06b6d4; }
  .cat-mini {
    display: inline-block; margin-left: 6px; padding: 1px 5px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    border-radius: 3px; vertical-align: middle;
  }

  /* Search bar in picker */
  .sheet-search {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px 12px; border-bottom: 1px solid var(--border);
    position: relative;
  }
  .sheet-search-icon { font-size: 14px; opacity: 0.6; flex-shrink: 0; }
  .sheet-search-input {
    flex: 1; padding: 10px 12px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; font-size: 14px;
    outline: none; transition: border-color 150ms;
  }
  .sheet-search-input:focus { border-color: var(--accent); background: #ffffff; }
  .sheet-search-clear {
    background: var(--border-strong); color: #ffffff; border: none;
    width: 22px; height: 22px; border-radius: 50%; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; padding: 0; line-height: 1;
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .anim-in { animation: slideUp 220ms ease-out both; }

  /* ========== Gamification ========== */
  /* Streak comment under header */
  .streak-comment {
    max-width: 560px; margin: -8px auto 0; padding: 0 20px;
    font-size: 13px; color: var(--secondary); font-weight: 600;
    letter-spacing: 0.02em; line-height: 1.5;
    animation: slideUp 320ms ease-out both;
  }
  .streak-comment.muted { color: var(--muted); }

  /* PR celebration overlay */
  @keyframes prPop { 0% { opacity: 0; transform: scale(0.8); } 60% { opacity: 1; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes confettiDrop { 0% { transform: translateY(-20px) rotate(0); opacity: 1; } 100% { transform: translateY(120vh) rotate(720deg); opacity: 0; } }
  .pr-overlay {
    position: fixed; inset: 0; background: rgba(10, 14, 26, 0.7);
    z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; animation: slideUp 220ms ease-out both;
  }
  .pr-card {
    background: linear-gradient(135deg, #ffffff 0%, var(--accent-soft) 100%);
    border: 2px solid var(--accent);
    border-radius: 20px; padding: 32px 24px; max-width: 360px; width: 100%;
    text-align: center; box-shadow: 0 12px 40px rgba(255, 87, 34, 0.35);
    animation: prPop 600ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .pr-eyebrow {
    font-size: 11px; color: var(--accent); letter-spacing: 0.4em; font-weight: 700;
    margin-bottom: 8px;
  }
  .pr-title { font-size: 28px; font-weight: 900; color: var(--text); margin-bottom: 24px; letter-spacing: 0.05em; }
  .pr-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .pr-row {
    background: rgba(255, 87, 34, 0.06); border: 1px solid rgba(255, 87, 34, 0.25);
    border-radius: 12px; padding: 14px;
  }
  .pr-row-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .pr-row-vals { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 14px; }
  .pr-old { color: var(--muted); text-decoration: line-through; font-family: "SF Mono", Menlo, monospace; }
  .pr-arrow { color: var(--accent); }
  .pr-new { color: var(--accent); font-weight: 900; font-family: "SF Mono", Menlo, monospace; font-size: 16px; }
  .pr-new-label { font-size: 9px; color: var(--accent); letter-spacing: 0.2em; font-weight: 700; margin-left: 4px; }
  .pr-close-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #ffffff;
    border: none; border-radius: 12px; font-size: 14px; font-weight: 700; letter-spacing: 0.2em;
    box-shadow: 0 4px 12px rgba(255, 87, 34, 0.3);
  }
  .pr-close-btn:active { background: var(--accent-hover); }
  .confetti {
    position: absolute; width: 8px; height: 8px; top: 0;
    animation: confettiDrop 2.5s linear forwards;
  }

  /* PR badge in history list */
  .pr-mini {
    display: inline-block; margin-left: 6px; padding: 1px 6px;
    background: var(--accent); color: #ffffff;
    font-size: 9px; font-weight: 900; letter-spacing: 0.15em; border-radius: 3px;
    vertical-align: middle;
  }

  /* Achievements tab */
  .ach-section { margin-bottom: 28px; }
  .ach-section-title {
    font-size: 11px; color: var(--muted); letter-spacing: 0.2em; font-weight: 700;
    margin-bottom: 12px;
  }
  .ach-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
  }
  .badge {
    aspect-ratio: 1; background: #ffffff; border: 1px solid var(--border);
    border-radius: 14px; padding: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    position: relative; overflow: hidden;
    box-shadow: 0 1px 3px rgba(10, 14, 26, 0.04);
  }
  .badge.locked { background: var(--surface); box-shadow: none; }
  .badge.unlocked {
    background: linear-gradient(135deg, var(--accent-soft) 0%, var(--surface) 100%);
    border-color: var(--accent);
  }
  .badge-icon { font-size: 28px; margin-bottom: 4px; line-height: 1; }
  .badge.locked .badge-icon { filter: grayscale(1) opacity(0.3); }
  .badge-name {
    font-size: 10px; font-weight: 700; line-height: 1.2;
    color: var(--text);
  }
  .badge.locked .badge-name { color: var(--muted); }
  .badge-desc {
    font-size: 9px; color: var(--muted); margin-top: 2px;
    line-height: 1.3;
  }
  .badge-new-tag {
    position: absolute; top: 6px; right: 6px;
    background: var(--accent); color: #ffffff;
    font-size: 8px; font-weight: 900; letter-spacing: 0.1em;
    padding: 1px 5px; border-radius: 3px;
  }
  .badge-progress {
    position: absolute; bottom: 0; left: 0; height: 2px;
    background: var(--accent); transition: width 400ms ease;
  }
  .ach-summary {
    background: linear-gradient(135deg, var(--accent-soft) 0%, var(--secondary-soft) 100%);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .ach-summary-text {
    font-size: 13px; color: var(--text); font-weight: 500;
  }
  .ach-summary-num {
    font-size: 24px; color: var(--accent); font-weight: 900;
    font-family: "Helvetica Neue", Impact, sans-serif;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

var STORAGE_KEY = "workouts:all_v1";
var BADGE_KEY = "badges:unlocked_v1";

var LIB = {
  chest:      { label: "胸",   code: "CHEST",  color: "#ff6b6b", items: [
    { name: "ベンチプレス" },
    { name: "インクラインベンチプレス" },
    { name: "デクラインベンチプレス" },
    { name: "ダンベルベンチプレス" },
    { name: "インクラインダンベルプレス" },
    { name: "ダンベルフライ" },
    { name: "ケーブルクロスオーバー", cable: true },
    { name: "ケーブルフライ", cable: true },
    { name: "ケーブルチェストプレス", cable: true },
    { name: "ディップス", bw: true },

// Helpers for bw badges
function hasBwExercise(workouts) {
  for (var i = 0; i < workouts.length; i++) {
    for (var j = 0; j < workouts[i].exercises.length; j++) {
      if (workouts[i].exercises[j].bw) return true;
    }
  }
  return false;
}

function totalRepsForName(workouts, name) {
  var total = 0;
  workouts.forEach(function (w) {
    w.exercises.forEach(function (e) {
      if (e.name !== name) return;
      e.sets.forEach(function (s) { total += (s.reps || 0); });
    });
  });
  return total;
}

function maxRepsForName(workouts, name) {
  var max = 0;
  workouts.forEach(function (w) {
    w.exercises.forEach(function (e) {
      if (e.name !== name) return;
      e.sets.forEach(function (s) { if ((s.reps || 0) > max) max = s.reps; });
    });
  });
  return max;
}

function totalAllVolume(workouts) {
  var total = 0;
  workouts.forEach(function (w) {
    w.exercises.forEach(function (e) {
      e.sets.forEach(function (s) { total += (s.weight || 0) * (s.reps || 0); });
    });
  });
  return total;
}

function distinctCategories(workouts) {
  var cats = {};
  workouts.forEach(function (w) {
    w.exercises.forEach(function (e) {
      if (e.category && e.category !== "custom") cats[e.category] = true;
    });
  });
  return Object.keys(cats).length;
}

function distinctExercises(workouts) {
  var ex = {};
  workouts.forEach(function (w) {
    w.exercises.forEach(function (e) { ex[e.name] = true; });
  });
  return Object.keys(ex).length;
}

function maxStreak(workouts) {
  if (!workouts.length) return 0;
  var dates = workouts.map(function (w) { return w.date; }).sort();
  var unique = [];
  dates.forEach(function (d) { if (unique.indexOf(d) === -1) unique.push(d); });
  var max = 1, cur = 1;
  for (var i = 1; i < unique.length; i++) {
    var prev = new Date(unique[i - 1] + "T00:00:00");
    var curr = new Date(unique[i] + "T00:00:00");
    var diff = (curr - prev) / 86400000;
    if (diff === 1) { cur++; if (cur > max) max = cur; }
    else cur = 1;
  }
  return max;
}

function hasTimeOfDay(workouts, startH, endH) {
  // endH may be > 24 to express past-midnight (e.g. 26 = 2am)
  for (var i = 0; i < workouts.length; i++) {
    if (!workouts[i].createdAt) continue;
    var h = new Date(workouts[i].createdAt).getHours();
    if (endH > 24) {
      if (h >= startH || h < (endH - 24)) return true;
    } else {
      if (h >= startH && h < endH) return true;
    }
  }
  return false;
}

// PR detection:
// - Weighted: PR = max single-set weight
// - Bodyweight (no added weight): PR = max single-set reps
// - Bodyweight + time: PR = max single-set seconds
// - Bodyweight with added weight: PR = max single-set added weight (and we display it specially)
function detectPRs(newWorkout, priorWorkouts) {
  var prs = [];
  newWorkout.exercises.forEach(function (ex) {
    var isBw = !!ex.bw;
    var isTime = !!ex.time;

    // For bodyweight/time exercises, PR metric is reps/seconds; weight is bonus
    // Use weight if any set has weight > 0, otherwise use reps
    var useReps = isBw && !ex.sets.some(function (s) { return (s.weight || 0) > 0; });

    var newBest = 0;
    ex.sets.forEach(function (s) {
      var v = useReps ? (s.reps || 0) : (s.weight || 0);
      if (v > newBest) newBest = v;
    });
    if (newBest === 0) return;

    var oldBest = 0;
    priorWorkouts.forEach(function (w) {
      w.exercises.forEach(function (pe) {
        if (pe.name !== ex.name) return;
        // Determine prior exercise's metric in the same way
        var priorUseReps = pe.bw && !pe.sets.some(function (s) { return (s.weight || 0) > 0; });
        // Only compare if same metric type (avoid weight vs reps comparison)
        if (priorUseReps !== useReps) return;
        pe.sets.forEach(function (s) {
          var v = useReps ? (s.reps || 0) : (s.weight || 0);
          if (v > oldBest) oldBest = v;
        });
      });
    });

    if (newBest > oldBest && oldBest > 0) {
      var unit = useReps ? (isTime ? "秒" : "回") : "kg";
      prs.push({
        name: ex.name,
        oldBest: oldBest,
        newBest: newBest,
        unit: unit
      });
    }
  });
  return prs;
}

function countAllTimePRs(workouts) {
  // Track best per exercise. Key: exercise name + metric type
  var byKey = {};
  var sorted = workouts.slice().sort(function (a, b) {
    return a.date.localeCompare(b.date) || (a.createdAt || "").localeCompare(b.createdAt || "");
  });
  var count = 0;
  sorted.forEach(function (w) {
    w.exercises.forEach(function (ex) {
      var useReps = ex.bw && !ex.sets.some(function (s) { return (s.weight || 0) > 0; });
      var key = ex.name + (useReps ? ":reps" : ":weight");
      var newMax = 0;
      ex.sets.forEach(function (s) {
        var v = useReps ? (s.reps || 0) : (s.weight || 0);
        if (v > newMax) newMax = v;
      });
      if (newMax === 0) return;
      var prev = byKey[key] || 0;
      if (newMax > prev) {
        if (prev > 0) count++; // first record doesn't count as PR
        byKey[key] = newMax;
      }
    });
  });
  return count;
}

function todayISO() {
  var d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 10);
}

  } catch (e) {}
  try {

}

  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.workouts)); }
  catch (e) { toast("保存に失敗しました"); }
}

  try { localStorage.setItem(BADGE_KEY, JSON.stringify(state.unlockedBadges)); }
  catch (e) {}
}

// Run badge checks; returns array of newly unlocked badge IDs
function checkBadges() {
  var newly = [];
  var ctx = { prCount: countAllTimePRs(state.workouts) };
  BADGES.forEach(function (b) {
    if (state.unlockedBadges[b.id]) return;
    if (b.check(state.workouts, ctx)) {
      state.unlockedBadges[b.id] = new Date().toISOString();
      state.recentlyUnlocked[b.id] = true;
      newly.push(b);
    }
  });
  if (newly.length) persistBadges();
  return newly;
}

function totalVolume(ex) {
  return ex.sets.reduce(function (s, x) { return s + (x.weight || 0) * (x.reps || 0); }, 0);
}

function fmtDate(iso) {
  var parts = iso.split("-");
  var days = ["日","月","火","水","木","金","土"];
  var dt = new Date(iso + "T00:00:00");
  return { d: parseInt(parts[2], 10), y: parts[0], m: parseInt(parts[1], 10), wd: days[dt.getDay()] };
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function calcStreak() {
  if (!state.workouts.length) return 0;
  var dates = {};
  state.workouts.forEach(function (w) { dates[w.date] = true; });
  var s = 0, d = new Date(), safety = 0;
  while (safety++ < 1000) {
    var iso = d.toISOString().slice(0, 10);
    if (dates[iso]) { s++; d.setDate(d.getDate() - 1); }
    else {
      if (s === 0 && iso === todayISO()) { d.setDate(d.getDate() - 1); continue; }
      break;
    }
  }
  return s;
}

var toastTimer = null;
function toast(msg) {
  var old = document.querySelector(".toast");
  if (old) old.parentNode.removeChild(old);
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 2400);
}

  }, 0);

  var html = '<div class="anim-in">' +
    '<div class="stats-grid stats-2">' +
      statCard("SESSIONS", sessions, "") +

  state.workouts.forEach(function (w) {

          '<div class="session-meta mono">' + w.exercises.length + '種目 · ' + Math.round(vol).toLocaleString() + 'kg</div>' +

            '<div class="cat-bar" style="background:' + cat.color + '"></div>' +

            '<div class="cat-tag display" style="background:' + cat.color + '22;color:' + cat.color + '">' + cat.code + '</div>' +

          '</div>';

          if (ex.time) {
            valStr = (s.weight > 0 ? "+" + s.weight + "kg / " : "") + s.reps + "秒";

function renderProgress() {
  if (!state.workouts.length) {
    return '<div class="anim-in" style="padding:80px 20px;text-align:center;color:var(--muted)">' +
      '<div style="font-size:48px;color:var(--border);margin-bottom:12px">📈</div>' +
      '<div>記録が増えるとグラフが表示されます</div>' +
    '</div>';
  }
  var names = [], seen = {};
  state.workouts.forEach(function (w) {
    w.exercises.forEach(function (e) {
      if (!seen[e.name]) { seen[e.name] = true; names.push(e.name); }
    });
  });
  if (!state.selectedExercise || !seen[state.selectedExercise]) {
    state.selectedExercise = names[0];
  }
  var sel = state.selectedExercise;

  // Determine if this exercise is bodyweight (no added weight) by looking at all records
  var isBwExercise = false;
  var isTimeExercise = false;
  var allBw = true;
  var hasAnyWeight = false;
  state.workouts.forEach(function (w) {
    w.exercises.forEach(function (ex) {
      if (ex.name !== sel) return;
      if (ex.bw) {
        if (ex.time) isTimeExercise = true;
        ex.sets.forEach(function (s) {
          if ((s.weight || 0) > 0) hasAnyWeight = true;
        });
      } else {
        allBw = false;
      }
    });
  });
  isBwExercise = allBw && !hasAnyWeight;

  var points = [];
  state.workouts.slice().sort(function (a, b) { return a.date.localeCompare(b.date); }).forEach(function (w) {
    var ex;
    for (var i = 0; i < w.exercises.length; i++) {
      if (w.exercises[i].name === sel) { ex = w.exercises[i]; break; }
    }
    if (!ex) return;
    var maxW = 0, maxR = 0, vol = 0, e1rm = 0, totalReps = 0;
    ex.sets.forEach(function (s) {
      var weight = s.weight || 0, reps = s.reps || 0;
      if (weight > maxW) maxW = weight;
      if (reps > maxR) maxR = reps;
      vol += weight * reps;
      totalReps += reps;
      var e = weight * (1 + reps / 30);
      if (e > e1rm) e1rm = e;
    });
    points.push({
      date: w.date,
      max: maxW,
      maxReps: maxR,
      volume: Math.round(vol),
      e1rm: Math.round(e1rm * 10) / 10,
      totalReps: totalReps
    });
  });

  var metricInfo;
  if (isBwExercise) {
    var unit = isTimeExercise ? "秒" : "回";
    metricInfo = {
      maxReps:   { label: isTimeExercise ? "最長秒数" : "最大レップ", unit: unit, desc: "1セットでの最高記録" },
      totalReps: { label: isTimeExercise ? "合計秒数" : "合計レップ", unit: unit, desc: "そのセッションの合計" }
    };
    if (state.metric !== "maxReps" && state.metric !== "totalReps") state.metric = "maxReps";
  } else {
    metricInfo = {
      max:    { label: "最大重量",    unit: "kg", desc: "そのセッションで挙げた最大重量" },
      volume: { label: "総ボリューム", unit: "kg", desc: "重量 × レップの総和" },
      e1rm:   { label: "推定1RM",     unit: "kg", desc: "Epley式で推定した1回挙上限界" }
    };
    if (state.metric !== "max" && state.metric !== "volume" && state.metric !== "e1rm") state.metric = "max";
  }
  var m = state.metric;
  var info = metricInfo[m];

  var stats = "";
  if (points.length) {
    var vals = points.map(function (p) { return p[m]; });
    var latest = vals[vals.length - 1];
    var best = Math.max.apply(null, vals);
    var delta = vals.length > 1 ? Math.round((vals[vals.length - 1] - vals[0]) * 10) / 10 : 0;
    stats = '<div class="stats-grid stats-3" style="margin-top:16px">' +
      statCard("LATEST", latest, info.unit) +
      statCard("BEST", best, info.unit) +
      statCard("CHANGE", (delta >= 0 ? "+" : "") + delta, info.unit) +
    '</div>';
  }

  var html = '<div class="anim-in">' +
    '<div class="label display">種目</div>' +
    '<div class="chip-row no-scroll">' +
      names.map(function (n) {
        return '<button class="chip ' + (n === sel ? "active" : "") + '" data-action="selectExercise" data-name="' + esc(n) + '">' + esc(n) + '</button>';
      }).join("") +
    '</div>' +
    '<div class="label display" style="margin-top:20px">指標</div>' +
    '<div class="seg-row">' +
      Object.keys(metricInfo).map(function (k) {
        return '<button class="seg display ' + (k === m ? "active" : "") + '" data-action="setMetric" data-metric="' + k + '">' + metricInfo[k].label + '</button>';
      }).join("") +
    '</div>' +
    stats +
    '<div class="chart-wrap">' + renderChart(points, m, info.unit) + '</div>' +
    '<div class="metric-desc">' + info.desc + '</div>' +
  '</div>';
  return html;
}

function renderChart(points, metric, unit) {
  if (points.length < 2) {
    return '<div class="chart-empty">グラフ表示には2回以上の記録が必要です<br>（現在 ' + points.length + ' 回）</div>';
  }
  var W = 520, H = 256;
  var padL = 36, padR = 12, padT = 12, padB = 28;
  var innerW = W - padL - padR;
  var innerH = H - padT - padB;

  var vals = points.map(function (p) { return p[metric]; });
  var minV = Math.min.apply(null, vals);
  var maxV = Math.max.apply(null, vals);
  if (minV === maxV) { minV -= 1; maxV += 1; }
  var range = maxV - minV;
  var yMin = Math.max(0, minV - range * 0.1);
  var yMax = maxV + range * 0.1;

  var xStep = points.length > 1 ? innerW / (points.length - 1) : innerW;
  var xy = points.map(function (p, i) {
    return {
      x: padL + i * xStep,
      y: padT + innerH - ((p[metric] - yMin) / (yMax - yMin)) * innerH,
      p: p
    };
  });

  var ticks = [];
  for (var i = 0; i <= 4; i++) {
    var v = yMin + (yMax - yMin) * (i / 4);
    var ty = padT + innerH - (i / 4) * innerH;
    ticks.push({ v: Math.round(v * 10) / 10, y: ty });
  }

  var xLabels = [];
  if (points.length <= 6) {
    points.forEach(function (p, i) { xLabels.push({ i: i, label: p.date.slice(5).replace("-", "/") }); });
  } else {
    [0, Math.floor(points.length / 2), points.length - 1].forEach(function (i) {
      xLabels.push({ i: i, label: points[i].date.slice(5).replace("-", "/") });
    });
  }

  var path = xy.map(function (q, i) {
    return (i === 0 ? "M" : "L") + q.x.toFixed(1) + "," + q.y.toFixed(1);
  }).join(" ");

  var svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">';
  ticks.forEach(function (t) {
    svg += '<line x1="' + padL + '" y1="' + t.y + '" x2="' + (W - padR) + '" y2="' + t.y + '" stroke="#e0e3e9" stroke-dasharray="2 4"></line>';
    svg += '<text x="' + (padL - 6) + '" y="' + (t.y + 3) + '" text-anchor="end" font-size="10" fill="#6b7280" font-family="SF Mono, monospace">' + t.v + '</text>';
  });
  svg += '<path d="' + path + '" fill="none" stroke="#ff5722" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>';
  xy.forEach(function (q) {
    svg += '<circle cx="' + q.x + '" cy="' + q.y + '" r="3.5" fill="#ff5722"></circle>';
  });
  xLabels.forEach(function (l) {
    var x = padL + l.i * xStep;
    svg += '<text x="' + x + '" y="' + (H - 8) + '" text-anchor="middle" font-size="10" fill="#6b7280" font-family="SF Mono, monospace">' + l.label + '</text>';
  });
  svg += '</svg>';
  return svg;
}

function renderAchievements() {
  // Clear "new" badges when viewing this tab
  var stillNew = Object.assign({}, state.recentlyUnlocked);

  var unlockedCount = Object.keys(state.unlockedBadges).length;
  var totalCount = BADGES.length;

  // Group badges by group
  var groups = {
    milestone: { label: "マイルストーン", badges: [] },
    streak:    { label: "ストリーク",     badges: [] },
    volume:    { label: "ボリューム",     badges: [] },
    pr:        { label: "PR",            badges: [] },
    bw:        { label: "自重トレーニング", badges: [] },
    variety:   { label: "バラエティ",     badges: [] },
    vibe:      { label: "ライフスタイル", badges: [] },
  };
  BADGES.forEach(function (b) {
    if (groups[b.group]) groups[b.group].badges.push(b);
  });

  var html = '<div class="anim-in">' +
    '<div class="ach-summary">' +
      '<div>' +
        '<div class="ach-summary-text">獲得バッジ</div>' +
        '<div style="font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-top:2px">ACHIEVEMENTS</div>' +
      '</div>' +
      '<div>' +
        '<span class="ach-summary-num">' + unlockedCount + '</span>' +
        '<span style="font-size:14px;color:var(--muted);margin-left:4px">/ ' + totalCount + '</span>' +
      '</div>' +
    '</div>';

  Object.keys(groups).forEach(function (g) {
    var group = groups[g];
    if (!group.badges.length) return;
    html += '<div class="ach-section">' +
      '<div class="ach-section-title display">' + group.label + '</div>' +
      '<div class="ach-grid">';
    group.badges.forEach(function (b) {
      var unlocked = !!state.unlockedBadges[b.id];
      var isNew = !!stillNew[b.id];
      html += '<div class="badge ' + (unlocked ? "unlocked" : "locked") + '">' +
        (isNew ? '<div class="badge-new-tag">NEW</div>' : '') +
        '<div class="badge-icon">' + (unlocked ? b.icon : "🔒") + '</div>' +
        '<div class="badge-name">' + esc(b.name) + '</div>' +
        '<div class="badge-desc">' + esc(b.desc) + '</div>' +
      '</div>';
    });
    html += '</div></div>';
  });

  html += '</div>';

  // Clear "new" flags after rendering once the user viewed
  setTimeout(function () {
    if (Object.keys(state.recentlyUnlocked).length > 0) {
      state.recentlyUnlocked = {};
      // Don't re-render, badges are already shown without NEW tag on next render
    }
  }, 100);

  return html;
}

}

function renderSheet() {
  if (!state.pickerOpen) return "";
  var cat = LIB[state.pickerCat];
  var isCustom = state.pickerCat === "custom";
  var query = (state.pickerSearch || "").trim().toLowerCase();
  var isSearching = query.length > 0;

  var html = '<div class="sheet-backdrop" data-backdrop>' +
    '<div class="sheet">' +
      '<div class="sheet-handle"><div class="sheet-handle-bar"></div></div>' +
      '<div class="sheet-header">' +
        '<div class="sheet-title display">種目を選択</div>' +
        '<button class="sheet-close" data-action="closeSheet">×</button>' +
      '</div>';

  // Search bar (always visible, except in custom tab where we ask for a new name)
  if (!isCustom) {
    html += '<div class="sheet-search">' +
      '<div class="sheet-search-icon">🔍</div>' +
      '<input class="sheet-search-input" placeholder="種目を検索（例：ベンチ、ケーブル）" value="' + esc(state.pickerSearch) + '" data-field="pickerSearch" type="search" autocomplete="off">' +
      (isSearching ? '<button class="sheet-search-clear" data-action="clearSearch">×</button>' : '') +
    '</div>';
  }

  // Category chips (hidden during search)
  if (!isSearching) {
    html += '<div class="sheet-cats no-scroll">';
    Object.keys(LIB).forEach(function (k) {
      var v = LIB[k];
      var active = state.pickerCat === k;
      var styleStr = active ? 'background:' + v.color + ';border-color:' + v.color + ';color:#ffffff' : '';
      html += '<button class="chip ' + (active ? "active" : "") + '" style="' + styleStr + '" data-action="setPickerCat" data-cat="' + k + '">' + v.label + '</button>';
    });
    html += '</div>';
  }

  html += '<div class="sheet-body">';

  if (isCustom && !isSearching) {
    var dis = !state.customName.trim();
    html += '<div class="label display">種目名を入力</div>' +
      '<input class="input" placeholder="例：ケーブルフライ" value="' + esc(state.customName) + '" data-field="customName">' +
      '<div style="display:flex;gap:8px;margin-top:12px">' +
        '<button class="seg display' + (state.customIsBw ? ' active' : '') + '" style="flex:1;padding:10px 8px;background:' + (state.customIsBw ? '#ffffff' : 'var(--surface)') + ';color:' + (state.customIsBw ? '#ec4899' : 'var(--muted)') + ';border:1px solid var(--border);border-radius:8px" data-action="toggleCustomBw">自重</button>' +
        '<button class="seg display' + (state.customIsTime ? ' active' : '') + '" style="flex:1;padding:10px 8px;background:' + (state.customIsTime ? '#ffffff' : 'var(--surface)') + ';color:' + (state.customIsTime ? '#60a5fa' : 'var(--muted)') + ';border:1px solid var(--border);border-radius:8px" data-action="toggleCustomTime">時間（秒）</button>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5">' +
        '通常はそのまま追加。自重なら「自重」を、プランクなど秒数記録なら「時間」もオン。' +
      '</div>' +
      '<button class="save-btn display" style="margin-top:12px;' + (dis ? 'background:var(--surface);color:var(--muted);box-shadow:none' : '') + '" data-action="addCustom">追加</button>';
  } else if (isSearching) {
    // Cross-category search results
    var results = [];
    var seen = {};
    Object.keys(LIB).forEach(function (k) {
      if (k === "custom") return;
      var libCat = LIB[k];
      libCat.items.forEach(function (item) {
        if (item.name.toLowerCase().indexOf(query) === -1) return;
        // Dedupe by name+category combo (same name in different cats are different entries)
        var key = k + ":" + item.name;
        if (seen[key]) return;
        seen[key] = true;
        results.push({ item: item, catKey: k, catData: libCat });
      });
    });

    if (!results.length) {
      html += '<div style="padding:48px 20px;text-align:center;color:var(--muted)">' +
        '<div style="font-size:36px;color:var(--border);margin-bottom:12px">🔍</div>' +
        '<div style="font-size:14px">「' + esc(state.pickerSearch) + '」に一致する種目はありません</div>' +
        '<div style="font-size:12px;margin-top:8px">カスタムタブから新規追加できます</div>' +
      '</div>';
    } else {
      html += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:0.1em">' + results.length + '件の種目</div>';
      html += '<div class="ex-grid">';
      results.forEach(function (r) {
        var item = r.item;
        var libCat = r.catData;
        var bwAttr = item.bw ? ' data-bw="1"' : '';
        var timeAttr = item.time ? ' data-time="1"' : '';
        var cableAttr = item.cable ? ' data-cable="1"' : '';
        html += '<button class="ex-pick" data-action="pickExercise" data-name="' + esc(item.name) + '" data-cat="' + r.catKey + '"' + bwAttr + timeAttr + cableAttr + '>' +
          '<div class="ex-pick-bar" style="background:' + libCat.color + '"></div>' +
          '<span class="ex-pick-name">' + esc(item.name) +
            '<span class="cat-mini" style="background:' + libCat.color + '22;color:' + libCat.color + '">' + libCat.code + '</span>' +
            (item.bw ? '<span class="bw-tag">自重</span>' : '') +
            (item.time ? '<span class="bw-tag time-tag">秒</span>' : '') +
            (item.cable ? '<span class="bw-tag cable-tag">ケーブル</span>' : '') +
          '</span>' +
        '</button>';
      });
      html += '</div>';
    }
  } else {
    // Category browsing (no search)
    html += '<div class="ex-grid">';
    cat.items.forEach(function (item) {
      var itemName = item.name;
      var isBw = !!item.bw;
      var isTime = !!item.time;
      var isCable = !!item.cable;
      var bwAttr = isBw ? ' data-bw="1"' : '';
      var timeAttr = isTime ? ' data-time="1"' : '';
      var cableAttr = isCable ? ' data-cable="1"' : '';
      html += '<button class="ex-pick" data-action="pickExercise" data-name="' + esc(itemName) + '" data-cat="' + state.pickerCat + '"' + bwAttr + timeAttr + cableAttr + '>' +
        '<div class="ex-pick-bar" style="background:' + cat.color + '"></div>' +
        '<span class="ex-pick-name">' + esc(itemName) +
          (isBw ? '<span class="bw-tag">自重</span>' : '') +
          (isTime ? '<span class="bw-tag time-tag">秒</span>' : '') +
          (isCable ? '<span class="bw-tag cable-tag">ケーブル</span>' : '') +
        '</span>' +
      '</button>';
    });
    html += '</div>';
  }
  html += '</div></div></div>';
  return html;
}

// ============ Actions ============
function setTab(tab) {
  // Clear "new" badge flags when leaving achievements
  if (state.tab === "achievements" && tab !== "achievements") {
    state.recentlyUnlocked = {};
  }
  state.tab = tab;
  render();
}
function openPicker() {
  state.pickerOpen = true;
  state.customName = "";
  state.customIsBw = false;
  state.customIsTime = false;
  state.pickerSearch = "";
  render();
}
function toggleCustomBw() { state.customIsBw = !state.customIsBw; render(); }
function toggleCustomTime() {
  state.customIsTime = !state.customIsTime;
  if (state.customIsTime) state.customIsBw = true; // time implies bw
  render();
}
function closeSheet() { state.pickerOpen = false; render(); }
function setPickerCat(cat) { state.pickerCat = cat; render(); }

function pickExercise(name, cat, isBw, isTime, isCable) {
  state.draft.exercises.push({
    name: name,
    category: cat,
    bw: !!isBw,
    time: !!isTime,
    cable: !!isCable,
    sets: [{ weight: "", reps: "" }]
  });
  state.pickerOpen = false;
  state.pickerSearch = "";
  render();
}

function addCustom() {
  var name = state.customName.trim();
  if (!name) return;
  state.customName = "";
  pickExercise(name, "custom", state.customIsBw, state.customIsTime);
  state.customIsBw = false;
  state.customIsTime = false;
}

function addSet(i) {
  var ex = state.draft.exercises[i];
  var last = ex.sets[ex.sets.length - 1] || { weight: "", reps: "" };
  ex.sets.push({ weight: last.weight, reps: last.reps });
  render();
}

function removeSet(i, j) {
  var ex = state.draft.exercises[i];
  ex.sets.splice(j, 1);
  if (ex.sets.length === 0) ex.sets.push({ weight: "", reps: "" });
  render();
}

function removeEx(i) {
  state.draft.exercises.splice(i, 1);
  render();
}

function save() {
  var cleaned = [];
  state.draft.exercises.forEach(function (e) {
    if (!(e.name || "").trim()) return;
    var sets = [];
    e.sets.forEach(function (s) {
      if (e.bw) {
        // Bodyweight: only reps required, weight defaults to 0 (additional weight)
        if (s.reps !== "" && s.reps != null) {
          sets.push({
            weight: s.weight === "" || s.weight == null ? 0 : parseFloat(s.weight),
            reps: parseInt(s.reps, 10)
          });
        }
      } else {
        // Weighted: both required
        if (s.weight !== "" && s.reps !== "") {
          sets.push({ weight: parseFloat(s.weight), reps: parseInt(s.reps, 10) });
        }
      }
    });
    if (sets.length) {
      cleaned.push({
        name: e.name.trim(),
        category: e.category || "custom",
        bw: !!e.bw,
        time: !!e.time,
        sets: sets
      });
    }
  });
  if (!cleaned.length) {
    toast("種目とセットを入力してください");
    return;
  }

  var newWorkout = {
    id: Date.now().toString(),
    date: state.draft.date,
    exercises: cleaned,
    notes: state.draft.notes.trim(),
    createdAt: new Date().toISOString()
  };

  // Detect PRs against prior workouts (before adding the new one)
  var prs = detectPRs(newWorkout, state.workouts);

  state.workouts.push(newWorkout);
  state.workouts.sort(function (a, b) { return b.date.localeCompare(a.date); });
  persist();

  // Mark this workout with PRs so history can show them
  if (prs.length) {
    newWorkout.prs = prs.map(function (p) { return p.name; });
    persist();
  }

  // Check badges
  var newBadges = checkBadges();

  state.draft = { date: todayISO(), exercises: [], notes: "" };

  // Show PR celebration if any (priority over tab switch)
  if (prs.length) {
    state.prCelebration = { prs: prs, pendingBadges: newBadges };
    render();
    return;
  }

  state.tab = "history";
  render();

  if (newBadges.length) {
    toast("🏅 新バッジ: " + newBadges[0].name + (newBadges.length > 1 ? " 他" + (newBadges.length - 1) + "件" : ""));
  } else {
    toast("記録を保存しました");
  }
}

function closePR() {
  var pending = state.prCelebration && state.prCelebration.pendingBadges;
  state.prCelebration = null;
  state.tab = "history";
  render();
  if (pending && pending.length) {
    setTimeout(function () {
      toast("🏅 新バッジ: " + pending[0].name + (pending.length > 1 ? " 他" + (pending.length - 1) + "件" : ""));
    }, 200);
  }
}

function toggleSession(id) {
  state.expandedId = state.expandedId === id ? null : id;
  render();
}

function deleteSession(id) {
  if (!confirm("この記録を削除しますか？")) return;
  state.workouts = state.workouts.filter(function (w) { return w.id !== id; });
  persist();
  render();
  toast("記録を削除しました");
}

function selectExercise(name) { state.selectedExercise = name; render(); }
function setMetric(m) { state.metric = m; render(); }

function copyNotion() {
  if (!state.workouts.length) { toast("記録がありません"); return; }
  var md = state.workouts.map(function (w) {
    var header = "## 🏋️ " + w.date;
    var body = w.exercises.map(function (ex) {
      var sets = ex.sets.map(function (s, i) {
        if (ex.time) {
          return "  " + (i + 1) + ". " + (s.weight > 0 ? "+" + s.weight + "kg / " : "") + s.reps + "秒";
        } else if (ex.bw) {
          return "  " + (i + 1) + ". " + (s.weight > 0 ? "+" + s.weight + "kg × " : "自重 × ") + s.reps + "回";
        }
        return "  " + (i + 1) + ". " + s.weight + "kg × " + s.reps + "回";
      }).join("\n");
      return "### " + ex.name + "\n" + sets;
    }).join("\n\n");
    var note = w.notes ? "\n\n> 📝 " + w.notes : "";
    return header + "\n\n" + body + note;
  }).join("\n\n---\n\n");

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(md).then(
      function () { toast("Notion 用 Markdown をコピーしました"); },
      function () { fallbackCopy(md); }
    );
  } else { fallbackCopy(md); }
}

function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); toast("Markdown をコピーしました"); }
  catch (e) { toast("コピーに失敗しました"); }
  document.body.removeChild(ta);
}

function downloadIcs() {
  if (!state.workouts.length) { toast("記録がありません"); return; }
  function escIcs(s) {
    return String(s).replace(/\\/g, "\\\\").replace(/\n/g, "\\n").replace(/,/g, "\\,").replace(/;/g, "\\;");
  }
  var events = state.workouts.map(function (w) {
    var d = w.date.replace(/-/g, "");
    var summary = "トレーニング (" + w.exercises.length + "種目)";
    var desc = w.exercises.map(function (e) {
      var setsStr = e.sets.map(function (s) {
        if (e.time) return (s.weight > 0 ? "+" + s.weight + "kg/" : "") + s.reps + "秒";
        if (e.bw) return (s.weight > 0 ? "+" + s.weight + "kg×" : "自重×") + s.reps;
        return s.weight + "kg×" + s.reps;
      }).join(", ");
      if (e.bw) {
        var totalReps = e.sets.reduce(function (sum, s) { return sum + (s.reps || 0); }, 0);
        return e.name + ": " + setsStr + " (計" + totalReps + (e.time ? "秒" : "回") + ")";
      }
      var v = Math.round(totalVolume(e));
      return e.name + ": " + setsStr + " (計" + v + "kg)";
    }).join("\\n");
    var fullDesc = w.notes ? desc + "\\n\\n" + escIcs(w.notes) : desc;
    return [
      "BEGIN:VEVENT",
      "UID:" + w.id + "@kintore-log",
      "DTSTAMP:" + new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z",
      "DTSTART;VALUE=DATE:" + d,
      "SUMMARY:" + escIcs(summary),
      "DESCRIPTION:" + fullDesc,
      "END:VEVENT"
    ].join("\r\n");
  });
  var ics = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Kintore//JP//EN","CALSCALE:GREGORIAN"].concat(events).concat(["END:VCALENDAR"]).join("\r\n");
  downloadBlob(ics, "workouts_" + todayISO() + ".ics", "text/calendar;charset=utf-8");
  toast("カレンダーファイルをダウンロード");
}

function exportJson() {
  if (!state.workouts.length) { toast("記録がありません"); return; }
  downloadBlob(JSON.stringify(state.workouts, null, 2), "workouts_backup_" + todayISO() + ".json", "application/json");
  toast("バックアップをダウンロード");
}

function downloadBlob(content, filename, type) {
  var blob = new Blob([content], { type: type });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
}

function importJson(file) {
  var reader = new FileReader();
  reader.onload = function (e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { toast("不正なファイル形式"); return; }
      var existingIds = {};
      state.workouts.forEach(function (w) { existingIds[w.id] = true; });
      var added = 0;
      data.forEach(function (w) {
        if (w.id && !existingIds[w.id]) { state.workouts.push(w); added++; }
      });
      state.workouts.sort(function (a, b) { return b.date.localeCompare(a.date); });
      persist();
      var newBadges = checkBadges();
      render();
      if (newBadges.length) {
        toast(added + "件をインポート / 🏅 新バッジ " + newBadges.length + "件");
      } else {
        toast(added + "件をインポート");
      }
    } catch (err) {
      toast("ファイルを読み込めません");
    }
  };
  reader.readAsText(file);
}

// ============ Event delegation ============
document.addEventListener("click", function (e) {
  // Sheet backdrop close
  if (e.target.hasAttribute("data-backdrop")) {
    state.pickerOpen = false;
    render();
    return;
  }

  var t = e.target.closest("[data-action]");
  if (!t) return;
  var a = t.getAttribute("data-action");

  if (a === "setTab") setTab(t.getAttribute("data-tab"));
  else if (a === "openPicker") openPicker();
  else if (a === "closeSheet") closeSheet();
  else if (a === "setPickerCat") setPickerCat(t.getAttribute("data-cat"));
  else if (a === "pickExercise") pickExercise(t.getAttribute("data-name"), t.getAttribute("data-cat"), t.getAttribute("data-bw") === "1", t.getAttribute("data-time") === "1", t.getAttribute("data-cable") === "1");
  else if (a === "addCustom") addCustom();
  else if (a === "toggleCustomBw") toggleCustomBw();
  else if (a === "toggleCustomTime") toggleCustomTime();
  else if (a === "clearSearch") { state.pickerSearch = ""; render(); }
  else if (a === "addSet") addSet(parseInt(t.getAttribute("data-i"), 10));
  else if (a === "removeSet") removeSet(parseInt(t.getAttribute("data-i"), 10), parseInt(t.getAttribute("data-j"), 10));
  else if (a === "removeEx") removeEx(parseInt(t.getAttribute("data-i"), 10));
  else if (a === "save") save();
  else if (a === "closePR") closePR();
  else if (a === "toggleSession") toggleSession(t.getAttribute("data-id"));
  else if (a === "deleteSession") deleteSession(t.getAttribute("data-id"));
  else if (a === "selectExercise") selectExercise(t.getAttribute("data-name"));
  else if (a === "setMetric") setMetric(t.getAttribute("data-metric"));
  else if (a === "copyNotion") copyNotion();
  else if (a === "downloadIcs") downloadIcs();
  else if (a === "exportJson") exportJson();
});

document.addEventListener("input", function (e) {
  var t = e.target;
  var f = t.getAttribute("data-field");
  if (!f) return;

  if (f === "date") state.draft.date = t.value;
  else if (f === "notes") state.draft.notes = t.value;
  else if (f === "exName") {
    var i = parseInt(t.getAttribute("data-i"), 10);
    if (state.draft.exercises[i]) state.draft.exercises[i].name = t.value;
  } else if (f === "weight" || f === "reps") {
    var ii = parseInt(t.getAttribute("data-i"), 10);
    var jj = parseInt(t.getAttribute("data-j"), 10);
    if (state.draft.exercises[ii] && state.draft.exercises[ii].sets[jj]) {
      state.draft.exercises[ii].sets[jj][f] = t.value;
    }
  } else if (f === "customName") state.customName = t.value;
  else if (f === "pickerSearch") {
    state.pickerSearch = t.value;
    render();
    // Refocus search input after re-render
    setTimeout(function () {
      var inp = document.querySelector(".sheet-search-input");
      if (inp && document.activeElement !== inp) {
        inp.focus();
        // Move cursor to end
        var len = inp.value.length;
        try { inp.setSelectionRange(len, len); } catch (e) {}
      }
    }, 0);
  }
});

document.addEventListener("change", function (e) {
  var t = e.target;
  if (t.getAttribute("data-action") === "importFile" && t.files && t.files[0]) {
    importJson(t.files[0]);
    t.value = "";
  }
});

// Boot
load();
// Check badges silently on first load (existing users get retroactive unlocks without NEW tag)
(function () {
  var hadBadges = Object.keys(state.unlockedBadges).length > 0;
  var ctx = { prCount: countAllTimePRs(state.workouts) };
  BADGES.forEach(function (b) {
    if (state.unlockedBadges[b.id]) return;
    if (b.check(state.workouts, ctx)) {
      state.unlockedBadges[b.id] = new Date().toISOString();
      // Only flag as NEW if user already had some badges (they're an existing user discovering this feature)
      // For brand-new users, retroactive unlocks during their first session don't deserve NEW tags
      if (!hadBadges && state.workouts.length === 0) {
        // No-op
      }
    }
  });
  persistBadges();
})();
render();
</script>
